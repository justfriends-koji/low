<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Low Records & Coffee POS</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<script src="StarWebPrintBuilder.js"></script>
<script src="StarWebPrintTrader.js"></script>
<style>
:root {
  --primary: #3a3128;
  --secondary: #6b5c4e;
  --accent: #c8a97e;
  --bg: #f5f2ee;
  --text: #2c2218;
  --gray: #999;
  --danger: #c0392b;
  --info: #5b7fa6;
  --success: #6aaa7e;
  --card: #fff;
  --border: #e0d8cf;
}
* { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-user-select: none; overflow: hidden; height: 100vh; height: 100dvh; }

header {
  background: var(--primary);
  padding: 0 15px;
  display: flex; align-items: center; justify-content: space-between;
  height: 55px; flex-shrink: 0;
  color: #fff;
}
.header-title { font-size: 22px; font-weight: 300; letter-spacing: 0.15em; }
.admin-btn {
  font-size: 12px; cursor: pointer; padding: 7px 14px;
  border: 1px solid rgba(255,255,255,0.4); border-radius: 20px;
  color: rgba(255,255,255,0.85); background: transparent; white-space: nowrap;
}
.reload-btn { font-size: 24px; cursor: pointer; padding: 10px; color: var(--accent); }

.view { display: none; height: 100vh; height: 100dvh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); }
.view.active { display: flex; }

/* ===== INDEX ===== */
.grid-tables {
  display: grid; grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: min-content; gap: 10px; padding: 15px;
  overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch;
}
.table-btn {
  background: var(--card); border: 1.5px solid var(--border);
  padding: 14px 5px; text-align: center; border-radius: 14px;
  cursor: pointer; box-shadow: 0 2px 6px rgba(58,49,40,0.07);
  min-height: 90px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; gap: 4px;
}
.table-btn.occupied { background: #fdf6ec; border-color: var(--accent); }
.table-btn.custom-seat { border-color: var(--info); }
.table-btn.custom-seat.occupied { background: #eef3fa; border-color: var(--info); }
.table-name { font-size: 15px; font-weight: 600; color: var(--primary); }
.price-badge { font-size: 11px; color: var(--accent); font-weight: bold; }
.table-btn-add {
  background: transparent; border: 2px dashed #ccc;
  padding: 14px 5px; text-align: center; border-radius: 14px;
  cursor: pointer; min-height: 90px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; color: #bbb;
}
.table-btn-add:active { background: rgba(0,0,0,0.03); }

/* ===== GUEST INPUT ===== */
.guest-input-container { text-align: center; padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; }
.guest-num-display { font-size: 56px; font-weight: 300; margin-bottom: 20px; color: var(--primary); background: #efe9e2; border-radius: 15px; padding: 15px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto; }
.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 450px; margin: 0 auto; }
.key-btn { background: var(--card); border: 1px solid var(--border); padding: 22px 0; font-size: 28px; font-weight: 500; border-radius: 14px; box-shadow: 0 3px 6px rgba(0,0,0,0.06); cursor: pointer; color: var(--primary); }

/* ===== MENU ===== */
.menu-container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 100px; background: var(--primary); overflow-y: auto; flex-shrink: 0; padding-bottom: 150px !important; }
.cat { padding: 18px 6px; font-size: 11px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); cursor: pointer; color: rgba(255,255,255,0.55); line-height: 1.4; }
.cat.active { background: rgba(255,255,255,0.12); color: var(--accent); font-weight: bold; border-left: 4px solid var(--accent); }
.item-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 10px; align-content: start; background: var(--bg); padding-bottom: 150px !important; }
.item-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 6px rgba(58,49,40,0.06); }
.item-name { font-weight: 600; font-size: 13px; height: 2.8em; overflow: hidden; line-height: 1.4; margin-bottom: 3px; color: var(--primary); }
.item-sub { font-size: 10px; color: #999; line-height: 1.3; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
.item-price { color: var(--secondary); font-weight: bold; font-size: 14px; margin-bottom: 8px; }
.qty-ctrl { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f0ebe5; padding-top: 10px; }
.btn-circle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: var(--primary); }
.btn-add { background: var(--primary); color: #fff; border: none; padding: 10px 0; border-radius: 20px; font-size: 13px; font-weight: bold; flex: 1; margin-left: 8px; }

footer { width: 100%; display: flex; flex-direction: column; z-index: 100; box-shadow: 0 -3px 10px rgba(0,0,0,0.08); flex-shrink: 0; }
.footer-history { background: var(--secondary); color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 13px; cursor: pointer; }
.footer-cart { background: var(--accent); color: var(--primary); padding: 16px 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 17px; cursor: pointer; }

/* ===== LISTS / CHECKOUT ===== */
.list-container { flex: 1; overflow-y: auto; background: var(--card); -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
.list-row { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border); align-items: center; }
.summary-area { padding: 15px 25px; text-align: right; background: var(--card); border-top: 2px solid var(--border); flex-shrink: 0; line-height: 1.6; font-size: 15px; }
.btn-large { width: 90%; display: block; margin: 10px auto; padding: 18px; border: none; border-radius: 36px; font-size: 18px; font-weight: bold; cursor: pointer; text-align: center; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }

/* ===== ADMIN ===== */
.admin-nav { display: flex; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.admin-nav-btn { flex: 1; padding: 14px; text-align: center; font-size: 13px; font-weight: bold; color: #999; cursor: pointer; border-bottom: 3px solid transparent; }
.admin-nav-btn.active { color: var(--primary); border-bottom-color: var(--accent); }
.sale-card { background: var(--card); margin: 10px; padding: 14px; border-radius: 14px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); border-left: 8px solid var(--accent); }
.sale-time-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.sale-time { font-size: 17px; font-weight: bold; color: var(--primary); }
.sale-table-badge { background: var(--bg); padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: bold; }
.sale-detail-info { font-size: 13px; color: #777; margin-bottom: 8px; }
.sale-total-line { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.sale-price-big { font-size: 22px; font-weight: bold; color: var(--accent); }
.btn-del-sale { background: var(--danger); color: #fff; border: none; padding: 7px 13px; border-radius: 18px; font-size: 11px; font-weight: bold; cursor: pointer; }
.report-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px 12px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.btn-report { background: var(--primary); color: #fff; border: none; padding: 15px 0; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; }

/* ===== OVERLAYS ===== */
.overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 200; justify-content: center; align-items: center; padding: 20px 0; }
.modal { background: var(--card); width: 90%; max-width: 340px; border-radius: 20px; padding: 22px; text-align: center; position: relative; max-height: 90dvh; overflow-y: auto; }
.receipt-sample { background: var(--card); padding: 14px; color: #000; font-family: monospace; text-align: left; font-size: 11px; border: 1px dashed #ccc; width: 100%; }
.receipt-hr { border-top: 1px dashed #000; margin: 5px 0; }

/* ===== LOGIN ===== */
.login-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; background: var(--card); }
.login-input { width: 100%; max-width: 420px; padding: 22px; margin-bottom: 20px; border: 2px solid var(--border); border-radius: 16px; font-size: 22px; background: var(--bg); -webkit-appearance: none; color: var(--primary); }
</style>
</head>
<body>

<script type="module">
// ▼ Firebase設定（プロジェクト作成後に差し替えてください）
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.firebasestorage.app",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const isFirebaseReady = firebaseConfig.apiKey !== "YOUR_API_KEY";

// Firebase未設定時はスタブ関数で動作
if (!isFirebaseReady) {
  console.warn("Firebase未設定 - ローカルモードで動作します");
  window.currentUser = null;
  window.isEditing = false;
  window.cloudSync = async () => {};
  window.saveSaleToCloud = async (tableId) => {
    // ローカルのみ：historyとguestsを消去してindexへ
    localStorage.removeItem('history_' + tableId);
    localStorage.removeItem('guests_' + tableId);
    localStorage.removeItem('checkin_' + tableId);
  };
  window.getSalesData = async () => [];
  window.deleteSaleDoc = async () => alert("Firebase未設定のため利用できません");
  window.deleteDaySales = async () => alert("Firebase未設定のため利用できません");
  window.loginOwner = async () => alert("Firebase未設定のためログインできません");
  window.logoutOwner = () => {};
} else {
  // Firebase本番
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
  const { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, addDoc, getDocs, Timestamp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
  const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window.currentUser = null;
  window.isEditing = false;

  onAuthStateChanged(auth, (user) => {
    window.currentUser = user;
    const btn = document.getElementById('admin-btn-label');
    if(user) { btn.innerText = "管理(オーナー)"; btn.style.borderColor = "rgba(200,169,126,0.9)"; if(document.getElementById('view-login').style.display !== 'none') showAdmin('day'); }
    else { btn.innerText = "売上管理"; btn.style.borderColor = "rgba(255,255,255,0.4)"; }
  });

  window.loginOwner = async (email, pass) => {
    try { await signInWithEmailAndPassword(auth, email, pass); alert("ログイン成功"); showAdmin('day'); }
    catch(e) { alert("ログイン失敗"); }
  };
  window.logoutOwner = () => { signOut(auth); alert("ログアウト完了"); showIndex(); };

  onSnapshot(collection(db, "tables"), (snapshot) => {
    if(window.isEditing) return;
    const allIds = snapshot.docs.map(d => d.id);
    getTablesL().forEach(tId => {
      if(!allIds.includes(tId)) {
        localStorage.removeItem('history_'+tId); localStorage.removeItem('guests_'+tId); localStorage.removeItem('checkin_'+tId);
      }
    });
    snapshot.forEach((docSnap) => {
      const tId = docSnap.id; const data = docSnap.data();
      localStorage.setItem('history_'+tId, JSON.stringify(data.history || []));
      localStorage.setItem('guests_'+tId, data.guests || 0);
      localStorage.setItem('checkin_'+tId, data.checkin || "--:--");
    });
    renderIndex(); updateFooter();
  });

  window.cloudSync = async (tableId) => {
    try {
      await setDoc(doc(db, "tables", tableId), {
        history: JSON.parse(localStorage.getItem('history_'+tableId) || '[]'),
        guests: parseInt(localStorage.getItem('guests_'+tableId)) || 0,
        checkin: localStorage.getItem('checkin_'+tableId) || "--:--",
        updatedAt: Timestamp.now()
      });
    } catch(e) { console.warn('cloudSync失敗:', e.message); }
  };

  window.saveSaleToCloud = async (tableId, paymentMethod) => {
    const hist = JSON.parse(localStorage.getItem('history_'+tableId) || '[]');
    if(hist.length === 0) return;
    const guests = parseInt(localStorage.getItem('guests_'+tableId)) || 0;
    const checkin = localStorage.getItem('checkin_'+tableId) || "--:--";
    let subtotal = 0, tax = 0;
    hist.forEach(i => { subtotal += i.price * i.qty; tax += Math.floor(i.price * i.qty * i.rate); });
    try {
      await addDoc(collection(db, "sales"), {
        tableId, guests, checkin,
        checkout: new Date().getHours().toString().padStart(2,'0')+":"+new Date().getMinutes().toString().padStart(2,'0'),
        items: hist, subtotal, tax, total: subtotal+tax,
        paymentMethod: paymentMethod || '現金',
        timestamp: Timestamp.now()
      });
    } catch(e) { console.warn("売上保存失敗:", e.message); }
    try { await deleteDoc(doc(db, "tables", tableId)); } catch(e) {}
  };

  window.getSalesData = async () => {
    const snap = await getDocs(collection(db, "sales"));
    let res = [];
    snap.forEach(d => { let data = d.data(); data.id = d.id; res.push(data); });
    return res.sort((a,b) => b.timestamp - a.timestamp);
  };

  window.deleteSaleDoc = async (id) => {
    if(confirm("削除しますか？")) { await deleteDoc(doc(db, "sales", id)); await new Promise(r => setTimeout(r, 500)); window.showAdmin('day'); }
  };
  window.deleteDaySales = async (label) => {
    const entry = Object.values(window._dayDeleteMap || {}).find(x => x.label === label);
    if(!entry) return alert("データが見つかりません");
    if(confirm(`${label} の${entry.ids.length}件を削除しますか？`)) {
      await Promise.all(entry.ids.map(id => deleteDoc(doc(db, "sales", id))));
      await new Promise(r => setTimeout(r, 500));
      window.showAdmin('dates');
    }
  };
}
</script>

<!-- スタブ（モジュール読み込み前に確実に定義） -->
<script>
window.currentUser = null;
window.isEditing = false;
window.cloudSync = async () => {};
window.saveSaleToCloud = async (tableId) => {
  localStorage.removeItem('history_' + tableId);
  localStorage.removeItem('guests_' + tableId);
  localStorage.removeItem('checkin_' + tableId);
};
window.getSalesData = async () => [];
window.deleteSaleDoc = async () => alert("Firebase未設定のため利用できません");
window.deleteDaySales = async () => alert("Firebase未設定のため利用できません");
window.loginOwner = async () => alert("Firebase未設定のためログインできません");
window.logoutOwner = () => {};
</script>

const menuData = [];
const allCat = { cat: "ALL", items: [] };
rawData.forEach(r => {
  allCat.items.push({ n: r[0], p: r[2], c: r[1], s: r[3] || "" });
  let c = menuData.find(x => x.cat === r[1]);
  if(!c) { c = { cat: r[1], items: [] }; menuData.push(c); }
  c.items.push({ n: r[0], p: r[2], s: r[3] || "" });
});
menuData.unshift(allCat);

// ===== 席管理 =====
const baseTablesL = ['1', '2', '3', '4', '5', '6', '7', '8', 'テイクアウト'];

function getCustomTableNames() { return JSON.parse(localStorage.getItem('customTables') || '[]'); }
function saveCustomTableNames(arr) { localStorage.setItem('customTables', JSON.stringify(arr)); }
function getTablesL() { return [...baseTablesL, ...getCustomTableNames()]; }

function openAddTableModal() {
  document.getElementById('new-table-name').value = '';
  document.getElementById('name-char-count').innerText = '0';
  document.getElementById('overlay-add-table').style.display = 'flex';
  setTimeout(() => document.getElementById('new-table-name').focus(), 100);
}
function closeAddTableModal() { document.getElementById('overlay-add-table').style.display = 'none'; }
function confirmAddTable() {
  const name = document.getElementById('new-table-name').value.trim();
  if(!name) return alert('名前を入力してください');
  if(getTablesL().includes(name)) return alert(`「${name}」はすでに存在します`);
  const customs = getCustomTableNames();
  customs.push(name);
  saveCustomTableNames(customs);
  closeAddTableModal();
  renderIndex();
}
function removeCustomTable(tId, e) {
  e.stopPropagation();
  const hist = JSON.parse(localStorage.getItem('history_'+tId) || '[]');
  if(hist.length > 0) return alert('注文中の席は削除できません');
  if(!confirm(`「${tId}」を削除しますか？`)) return;
  const customs = getCustomTableNames().filter(n => n !== tId);
  saveCustomTableNames(customs);
  localStorage.removeItem('history_'+tId); localStorage.removeItem('guests_'+tId); localStorage.removeItem('checkin_'+tId);
  renderIndex();
}

// ===== 状態変数 =====
let currentTable = "", currentCart = [], tempGuestCount = "0";
const PRINTER_URL = 'http://192.168.1.XX/StarWebPRNT/SendMessage';
const RECEIPT_PRINTER_URL = PRINTER_URL;
const isTestMode = true;
let currentAdminMode = 'day';

function hideAll() { document.querySelectorAll('.view').forEach(v => v.style.display = 'none'); }

function renderIndex() {
  const g = document.getElementById('table-grid');
  if(!g) return;
  const customs = getCustomTableNames();
  g.innerHTML = getTablesL().map(t => {
    const h = JSON.parse(localStorage.getItem('history_'+t) || '[]');
    const total = h.reduce((s, i) => s + Math.floor(i.price*i.qty*(1+i.rate)), 0);
    const isCustom = customs.includes(t);
    const customClass = isCustom ? ' custom-seat' : '';
    const delBtn = isCustom
      ? `<span onclick="removeCustomTable('${t}', event)" style="font-size:10px; color:#bbb; margin-top:3px; padding:2px 6px; border:1px solid #eee; border-radius:8px;">削除</span>`
      : '';
    return `<div class="table-btn${total>0?' occupied':''}${customClass}" onclick="onTableClick('${t}')">
      <div class="table-name">${t}</div>
      <div class="price-badge">${total>0?'¥'+total.toLocaleString():'空席'}</div>
      ${delBtn}
    </div>`;
  }).join('') +
  `<div class="table-btn-add" onclick="openAddTableModal()">
    <div style="font-size:32px;">＋</div>
    <div style="font-size:11px; margin-top:4px; color:#ccc;">席追加</div>
  </div>`;
}

function showIndex() { window.isEditing = false; hideAll(); document.getElementById('view-index').style.display = 'flex'; renderIndex(); }
function checkAdminAuth() { if(window.currentUser) showAdmin('day'); else { hideAll(); document.getElementById('view-login').style.display = 'flex'; } }
function handleLogin() { window.loginOwner(document.getElementById('login-email').value, document.getElementById('login-pass').value); }
function onTableClick(tId) { currentTable = tId; if(localStorage.getItem('history_'+tId)) showMenu(); else showGuestInput(); }

// ===== ADMIN =====
async function showAdmin(mode) {
  window.showAdmin = showAdmin;
  currentAdminMode = mode;
  hideAll(); document.getElementById('view-admin').style.display = 'flex';
  document.querySelectorAll('.admin-nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + (mode==='month'?'month':mode==='dow'?'dow':mode==='dates'?'dates':mode==='menu'?'menu':'day'));
  if(navEl) navEl.classList.add('active');
  const selArea = document.getElementById('month-selector-area');
  selArea.style.display = (['month','menu','dates','dow'].includes(mode)) ? 'flex' : 'none';
  const list = document.getElementById('sales-list');
  list.innerHTML = '<p style="text-align:center; padding:50px; color:#999;">集計中...</p>';
  try {
    const allSales = await window.getSalesData();
    if (['month','dates','dow','menu'].includes(mode)) {
      const monthSet = {};
      allSales.forEach(s => {
        const d = s.timestamp.toDate();
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        monthSet[key] = `${d.getFullYear()}年${d.getMonth()+1}月`;
      });
      const sel = document.getElementById('month-selector');
      const cv = sel.value;
      const now = new Date();
      const def = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
      sel.innerHTML = Object.keys(monthSet).sort().reverse().map(k =>
        `<option value="${k}" ${(cv||def)===k?'selected':''}>${monthSet[k]}</option>`).join('');
    }
    const now = new Date();
    const getYM = () => document.getElementById('month-selector').value.split('-').map(Number);
    let sales;
    if(mode==='day') sales = allSales.filter(s => s.timestamp.toDate().toDateString() === now.toDateString());
    else if(['month','dates','dow'].includes(mode)) {
      const [sy,sm] = getYM();
      sales = allSales.filter(s => { const d = s.timestamp.toDate(); return d.getFullYear()===sy && d.getMonth()+1===sm; });
    } else sales = allSales;

    let total = 0, guests = 0;
    if(mode==='day') {
      list.innerHTML = sales.map(s => {
        total += s.total; guests += s.guests;
        return `<div class="sale-card"><div class="sale-time-row"><span class="sale-time">${s.checkout}</span><span class="sale-table-badge">${s.tableId}</span></div><div class="sale-detail-info">${s.guests}名 / 入店 ${s.checkin} / ${s.paymentMethod||'現金'}</div><div class="sale-total-line"><span class="sale-price-big">¥${s.total.toLocaleString()}</span><button class="btn-del-sale" onclick="deleteSaleDoc('${s.id}')">削除</button></div></div>`;
      }).join('') || '<p style="text-align:center; padding:50px; color:#999;">本日データなし</p>';
    } else if(mode==='dates') {
      const dm = {};
      sales.forEach(s => {
        const d = s.timestamp.toDate();
        const key = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        const dow = ['日','月','火','水','木','金','土'][d.getDay()];
        if(!dm[key]) dm[key] = { label:`${key}（${dow}）`, t:0, c:0, g:0, ts:d.getTime(), ids:[], pay:{} };
        dm[key].t += s.total; dm[key].c++; dm[key].g += s.guests; dm[key].ids.push(s.id);
        const pm = s.paymentMethod||'現金'; dm[key].pay[pm] = (dm[key].pay[pm]||0) + s.total;
        total += s.total; guests += s.guests;
      });
      window._dayDeleteMap = dm;
      list.innerHTML = Object.values(dm).sort((a,b)=>b.ts-a.ts).map(s => {
        const pd = Object.entries(s.pay).map(([k,v])=>`${k}: ¥${v.toLocaleString()}`).join(' / ');
        return `<div class="sale-card"><div class="sale-time-row"><span class="sale-time" style="font-size:14px;">${s.label}</span></div><div class="sale-detail-info">${s.c}件 / ${s.g}名</div><div class="sale-detail-info" style="color:#aaa; font-size:11px;">${pd}</div><div class="sale-total-line"><span class="sale-price-big">¥${s.t.toLocaleString()}</span><button class="btn-del-sale" onclick="deleteDaySales('${s.label}')">削除</button></div></div>`;
      }).join('') || '<p style="text-align:center; padding:50px; color:#999;">データなし</p>';
    } else if(mode==='dow') {
      const labels = ['日','月','火','水','木','金','土'];
      const stats = [0,1,2,3,4,5,6].map(i=>({l:labels[i],t:0,c:0,g:0}));
      sales.forEach(s => { const d = s.timestamp.toDate().getDay(); stats[d].t+=s.total; stats[d].c++; stats[d].g+=s.guests; total+=s.total; guests+=s.guests; });
      list.innerHTML = stats.map(s => `<div class="sale-card"><div class="sale-time-row"><span class="sale-time">${s.l}曜日</span></div><div class="sale-detail-info">${s.c}件 / ${s.g}名</div><div class="sale-total-line"><span class="sale-price-big">¥${s.t.toLocaleString()}</span></div></div>`).join('');
    } else if(mode==='month') {
      sales.forEach(s => { total+=s.total; guests+=s.guests; });
      const dm = {};
      sales.forEach(s => {
        const d = s.timestamp.toDate();
        const key = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        const dow = ['日','月','火','水','木','金','土'][d.getDay()];
        if(!dm[key]) dm[key] = { label:`${key}（${dow}）`, t:0, c:0, g:0, ts:d.getTime() };
        dm[key].t+=s.total; dm[key].c++; dm[key].g+=s.guests;
      });
      list.innerHTML = Object.values(dm).sort((a,b)=>b.ts-a.ts).map(s =>
        `<div class="sale-card"><div class="sale-time-row"><span class="sale-time" style="font-size:14px;">${s.label}</span></div><div class="sale-detail-info">${s.c}件 / ${s.g}名</div><div class="sale-total-line"><span class="sale-price-big">¥${s.t.toLocaleString()}</span></div></div>`
      ).join('') || '<p style="text-align:center; padding:50px; color:#999;">データなし</p>';
    } else if(mode==='menu') {
      const [sy2,sm2] = getYM();
      const msales = allSales.filter(s => { const d = s.timestamp.toDate(); return d.getFullYear()===sy2 && d.getMonth()+1===sm2; });
      const im = {};
      msales.forEach(s => {
        total+=s.total; guests+=s.guests;
        (s.items||[]).forEach(i => {
          if(!im[i.name]) im[i.name] = { qty:0, amount:0 };
          im[i.name].qty += i.qty;
          im[i.name].amount += Math.floor(i.price*i.qty*(1+(i.rate||0.10)));
        });
      });
      list.innerHTML = `<div style="padding:10px 14px; font-size:12px; color:#999; border-bottom:1px solid var(--border);">📅 ${sy2}年${sm2}月 メニュー別集計</div>` +
        Object.entries(im).sort((a,b)=>b[1].qty-a[1].qty).map(([name,d],i) =>
          `<div class="sale-card"><div class="sale-time-row"><span class="sale-time" style="font-size:13px;">${i+1}. ${name}</span></div><div class="sale-detail-info">${d.qty}点</div><div class="sale-total-line"><span class="sale-price-big">¥${d.amount.toLocaleString()}</span></div></div>`
        ).join('') || '<p style="text-align:center; padding:50px; color:#999;">データなし</p>';
      document.getElementById('sum-count').innerText = msales.length;
    }
    document.getElementById('sum-total').innerText = total.toLocaleString();
    document.getElementById('sum-guests').innerText = guests;
    if(mode !== 'menu') document.getElementById('sum-count').innerText = sales.length;
    const payArea = document.getElementById('payment-summary-area');
    const pm = {};
    sales.forEach(s => { const p = s.paymentMethod||'現金'; pm[p]=(pm[p]||0)+s.total; });
    payArea.innerHTML = Object.entries(pm).map(([k,v]) =>
      `<span style="background:rgba(255,255,255,0.15); padding:3px 10px; border-radius:10px;">${k}: ¥${v.toLocaleString()}</span>`).join('');
    payArea.style.display = Object.keys(pm).length > 0 ? 'flex' : 'none';
  } catch(e) { list.innerHTML = `<p style="color:red; padding:20px;">エラー: ${e.message}</p>`; }
}

// CSV出力
async function exportCSV() {
  const allSales = await window.getSalesData();
  if(allSales.length === 0) return alert("データなし");
  const now = new Date();
  const options = [];
  const ms = {};
  allSales.forEach(s => {
    const d = s.timestamp.toDate();
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    ms[k] = `${d.getFullYear()}年${d.getMonth()+1}月`;
  });
  Object.keys(ms).sort().reverse().forEach(k => options.push({ key: k, label: ms[k] }));
  const chosen = await showPickerModal('CSV出力 対象月', options);
  if(!chosen) return;
  const [sy,sm] = chosen.split('-').map(Number);
  const sales = allSales.filter(s => { const d = s.timestamp.toDate(); return d.getFullYear()===sy && d.getMonth()+1===sm; }).sort((a,b)=>a.timestamp-b.timestamp);
  if(sales.length===0) return alert("データなし");
  const header = '日時,席,客数,入店,退店,支払方法,税抜,消費税,税込合計';
  const rows = sales.map(s => {
    const d = s.timestamp.toDate();
    const ds = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${s.checkout}`;
    return `${ds},${s.tableId},${s.guests}名,${s.checkin},${s.checkout},${s.paymentMethod||'現金'},${s.subtotal},${s.tax},${s.total}`;
  });
  const blob = new Blob(['\uFEFF'+header+'\n'+rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `LOW売上_${sy}年${sm}月.csv`; a.click();
}

async function printReport(mode) {
  const allSales = await window.getSalesData();
  const now = new Date();
  if(mode === 'month') {
    const ms = {};
    allSales.forEach(s => { const d=s.timestamp.toDate(); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; ms[k]=`${d.getFullYear()}年${d.getMonth()+1}月`; });
    const options = Object.keys(ms).sort().reverse().slice(0,3).map(k=>({key:k, label:ms[k]}));
    const chosen = await showPickerModal('月計印刷 対象月', options);
    if(!chosen) return;
    const [sy,sm] = chosen.split('-').map(Number);
    const sales = allSales.filter(s => { const d=s.timestamp.toDate(); return d.getFullYear()===sy && d.getMonth()+1===sm; });
    if(sales.length===0) return alert("データなし");
    let total=0, guests=0; sales.forEach(s=>{total+=s.total; guests+=s.guests;});
    const b = new StarWebPrintBuilder(); let r = b.createInitializationElement();
    r += b.createAlignmentElement({position:'center'}); r += b.createTextElement({data:`Low Records & Coffee\n【月計】${sy}年${sm}月\n`, width:2, height:2});
    r += b.createAlignmentElement({position:'left'}); r += b.createTextElement({data:`----------------------------\n売上: ¥${total.toLocaleString()}\n客数: ${guests}名 / ${sales.length}件\n----------------------------\n`});
    r += b.createCutPaperElement({type:'partial'});

  } else {
    const options = [];
    for(let i=-7; i<=0; i++) {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i);
      const dow = ['日','月','火','水','木','金','土'][d.getDay()];
      options.push({ key: d.toDateString(), label: `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}（${dow}）` });
    }
    const chosen = await showPickerModal('日計印刷 対象日', options);
    if(!chosen) return;
    const sales = allSales.filter(s => s.timestamp.toDate().toDateString() === chosen);
    if(sales.length===0) return alert("データなし");
    let total=0, guests=0; sales.forEach(s=>{total+=s.total; guests+=s.guests;});
    const b = new StarWebPrintBuilder(); let r = b.createInitializationElement();
    r += b.createAlignmentElement({position:'center'}); r += b.createTextElement({data:`Low Records & Coffee\n【日計】\n`, width:2, height:2});
    r += b.createAlignmentElement({position:'left'}); r += b.createTextElement({data:`${options.find(o=>o.key===chosen)?.label||''}\n----------------------------\n売上: ¥${total.toLocaleString()}\n客数: ${guests}名 / ${sales.length}件\n----------------------------\n`});
    r += b.createCutPaperElement({type:'partial'});
    new StarWebPrintTrader({url:RECEIPT_PRINTER_URL}).sendMessage({request:r}); alert("印刷しました");
  }
}

function showPickerModal(title, options) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
    const modal = document.createElement('div');
    modal.style.cssText = 'background:#fff;border-radius:16px;padding:22px;width:85%;max-width:320px;max-height:80vh;overflow-y:auto;';
    modal.innerHTML = `<div style="font-weight:bold;font-size:15px;margin-bottom:14px;text-align:center;color:var(--primary);">${title}</div>` +
      options.map(o => `<button data-key="${o.key}" style="width:100%;padding:12px;margin-bottom:8px;border:1.5px solid #eee;border-radius:10px;font-size:14px;background:#fff;cursor:pointer;">${o.label}</button>`).join('') +
      `<button data-key="cancel" style="width:100%;padding:10px;border:none;border-radius:10px;font-size:13px;background:#eee;color:#888;cursor:pointer;">キャンセル</button>`;
    modal.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => { document.body.removeChild(overlay); resolve(btn.getAttribute('data-key')==='cancel'?null:btn.getAttribute('data-key')); });
    });
    overlay.appendChild(modal); document.body.appendChild(overlay);
  });
}

  const total = parseInt(document.getElementById('checkout-final-total').innerText.replace(/[¥,]/g,''))||0;

  const el = document.getElementById('change-amount');

  if(received===0) { el.innerText='-'; el.style.color='var(--success)'; }
  else if(change<0) { el.innerText=`¥${Math.abs(change).toLocaleString()} 不足`; el.style.color='var(--danger)'; }
  else { el.innerText=`¥${change.toLocaleString()}`; el.style.color='var(--success)'; }
}

  currentCart.forEach(item => {
    r += b.createInitializationElement(); r += b.createAlignmentElement({position:'left'});
    r += b.createTextElement({data:`[${currentTable}] ${item.name} ${item.qty}\n`, width:2, height:2});
    r += b.createTextElement({data:`--------------------------\n`});
    r += b.createTextElement({data:`${new Date().toLocaleTimeString()} (入店:${c})\n`});
    r += b.createCutPaperElement({type:'partial'});
  });
  const t = new StarWebPrintTrader({url: RECEIPT_PRINTER_URL});
  t.onReceive = async () => {
    const hist = JSON.parse(localStorage.getItem('history_'+currentTable)||'[]');
    localStorage.setItem('history_'+currentTable, JSON.stringify(hist.concat(currentCart)));
    localStorage.removeItem('cart_'+currentTable); currentCart=[];
    if(window.cloudSync) await window.cloudSync(currentTable);
    hideAll(); document.getElementById('view-success').style.display='flex'; updateFooter();
  };
  t.sendMessage({request: r});
}

function openReceiptChoice() {
  if(isTestMode) { document.getElementById('receipt-preview-area').style.display='block'; renderReceiptSample(); }
  document.getElementById('overlay-receipt').style.display='flex';
}
function renderReceiptSample() {
  const h = JSON.parse(localStorage.getItem('history_'+currentTable)||'[]');
  const g = localStorage.getItem('guests_'+currentTable)||0;
  const c = localStorage.getItem('checkin_'+currentTable)||"--:--";
  let sub=0, tx=0;
  let t = `<div style="text-align:center;font-weight:bold;">Low Records & Coffee</div><div style="text-align:center;font-size:10px;">北海道札幌市北区北18条西5丁目1-8</div><div style="text-align:center;font-size:10px;">TEL: 080-5582-4507</div><div class="receipt-hr"></div><div>日時: ${new Date().toLocaleString()}</div><div>席: ${currentTable} / ${g}名 / 入店: ${c}</div><div class="receipt-hr"></div>`;
  h.forEach(i => { const l=i.price*i.qty; sub+=l; tx+=Math.floor(l*i.rate); t+=`<div>${i.name}<span style="float:right">¥${(l+Math.floor(l*i.rate)).toLocaleString()}</span></div>`; });
  t += `<div class="receipt-hr"></div><div style="text-align:right;font-weight:bold;">税込合計: ¥${(sub+tx).toLocaleString()}</div>`;
  document.getElementById('sample-receipt-content').innerHTML = t;
}
function closeReceiptChoice() { document.getElementById('overlay-receipt').style.display='none'; }

async function pay(doPrint) {
  closeReceiptChoice();
  const hist = JSON.parse(localStorage.getItem('history_'+currentTable)||'[]');
  const g = localStorage.getItem('guests_'+currentTable);
  const c = localStorage.getItem('checkin_'+currentTable);
  const b = new StarWebPrintBuilder(); let r = b.createInitializationElement();
  r += b.createPeripheralElement({channel:1, pulse:200});
  if(doPrint) {
    let sub8=0,tax8=0,sub10=0,tax10=0;
    r += b.createAlignmentElement({position:'center'});
    r += b.createTextElement({data:`Low Records & Coffee\n`, width:2, height:2});
    r += b.createTextElement({data:`北海道札幌市北区北18条西5丁目1-8\nTEL: 080-5582-4507\n\n`});
    r += b.createAlignmentElement({position:'left'});
    r += b.createTextElement({data:`日時: ${new Date().toLocaleString()}\n席: ${currentTable} / ${g}名 / 入店: ${c}\n----------------------------\n`});
    hist.forEach(i => {
      const l=i.price*i.qty; const t=Math.floor(l*i.rate); const ti=l+t;
      if(i.rate===0.08){sub8+=l;tax8+=t;}else{sub10+=l;tax10+=t;}
      const mark = i.rate===0.08?'※':'';
      r += b.createTextElement({data:`${i.name}${mark}\n  ${i.qty}点 ¥${ti.toLocaleString()}\n`});
    });
    const grand = sub8+tax8+sub10+tax10;
    r += b.createTextElement({data:`----------------------------\n`});
    r += b.createAlignmentElement({position:'right'});
    r += b.createTextElement({data:`¥${grand.toLocaleString()}\n`, width:2, height:2});
    r += b.createAlignmentElement({position:'left'});
    if(sub10>0) r += b.createTextElement({data:`10%対象: ¥${(sub10+tax10).toLocaleString()} 税: ¥${tax10.toLocaleString()}\n`});
    if(sub8>0)  r += b.createTextElement({data:`※8%対象: ¥${(sub8+tax8).toLocaleString()} 税: ¥${tax8.toLocaleString()}\n`});
    r += b.createTextElement({data:`お支払い: ${currentPaymentMethod}\n`});
    if(currentPaymentMethod==='現金') {
      const received = parseInt(document.getElementById('cash-received').value)||0;
      if(received>0) r += b.createTextElement({data:`お預かり: ¥${received.toLocaleString()}\nお釣り:   ¥${Math.max(0,received-grand).toLocaleString()}\n`});
    }
    r += b.createAlignmentElement({position:'center'});
    r += b.createTextElement({data:`\nありがとうございました\nLow Records & Coffee\n\n`});
    r += b.createCutPaperElement({type:'partial'});
  }
  const t = new StarWebPrintTrader({url: RECEIPT_PRINTER_URL});
  t.onReceive = async () => { if(window.saveSaleToCloud) await window.saveSaleToCloud(currentTable, currentPaymentMethod); showIndex(); };
  t.sendMessage({request: r});
}

// 領収書
function openRyoshuusho() {
  document.getElementById('ryoshuusho-atena').value = '';
  document.getElementById('ryoshuusho-tadashi').value = 'お飲食代として';
  updateRyoshuushoPreview();
  document.getElementById('overlay-ryoshuusho').style.display = 'flex';
}
function closeRyoshuusho() { document.getElementById('overlay-ryoshuusho').style.display = 'none'; }
function getRyoshuushoTotal() {
  const hist = JSON.parse(localStorage.getItem('history_'+currentTable)||'[]');
  let sub=0, tax=0;
  hist.forEach(i => { sub+=i.price*i.qty; tax+=Math.floor(i.price*i.qty*i.rate); });
  return { sub, tax, total: sub+tax };
}
function updateRyoshuushoPreview() {
  const atena = document.getElementById('ryoshuusho-atena').value||'上様';
  const tadashi = document.getElementById('ryoshuusho-tadashi').value||'お飲食代として';
  const {sub, tax, total} = getRyoshuushoTotal();
  const now = new Date(); const ds = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  document.getElementById('ryoshuusho-preview').innerHTML =
    `<div style="text-align:center;font-weight:bold;font-size:14px;margin-bottom:6px;">領　収　書</div>` +
    `<div style="border-bottom:1px solid #000;padding-bottom:4px;margin-bottom:6px;">${atena} 御中</div>` +
    `<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>金額</span><span style="font-weight:bold;font-size:15px;">¥${total.toLocaleString()}−</span></div>` +
    `<div style="font-size:11px;color:#555;margin-bottom:4px;">但し　${tadashi}</div>` +
    `<div style="font-size:11px;color:#555;margin-bottom:6px;">上記正に領収いたしました　${ds}</div>` +
    `<div style="border-top:1px dashed #ccc;padding-top:5px;font-size:10px;color:#888;">税抜: ¥${sub.toLocaleString()} / 消費税: ¥${tax.toLocaleString()}</div>` +
    `<div style="font-size:11px;text-align:right;margin-top:5px;">Low Records & Coffee</div>`;
}
function printRyoshuusho() {
  const atena = document.getElementById('ryoshuusho-atena').value||'上様';
  const tadashi = document.getElementById('ryoshuusho-tadashi').value||'お飲食代として';
  const {sub, tax, total} = getRyoshuushoTotal();
  const now = new Date(); const ds = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  const b = new StarWebPrintBuilder(); let r = b.createInitializationElement();
  r += b.createAlignmentElement({position:'center'}); r += b.createTextElement({data:`領　収　書\n`, width:2, height:2});
  r += b.createAlignmentElement({position:'left'});
  r += b.createTextElement({data:`----------------------------\n${atena} 御中\n\n`});
  r += b.createAlignmentElement({position:'right'}); r += b.createTextElement({data:`¥${total.toLocaleString()}-\n`, width:2, height:2});
  r += b.createAlignmentElement({position:'left'});
  r += b.createTextElement({data:`\n但し　${tadashi}\n上記正に領収いたしました\n${ds}\n----------------------------\n税抜: ¥${sub.toLocaleString()} / 消費税: ¥${tax.toLocaleString()}\n----------------------------\n`});
  r += b.createAlignmentElement({position:'center'}); r += b.createTextElement({data:`Low Records & Coffee\n北海道札幌市北区北18条西5丁目1-8\nTEL: 080-5582-4507\n\n`});
  r += b.createCutPaperElement({type:'partial'});
  const t = new StarWebPrintTrader({url: RECEIPT_PRINTER_URL});
  t.onReceive = () => { closeRyoshuusho(); alert("領収書を印刷しました"); };
  t.onError = () => { alert("プリンター接続エラー"); };
  t.sendMessage({request: r});
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ryoshuusho-atena').addEventListener('input', updateRyoshuushoPreview);
  document.getElementById('ryoshuusho-tadashi').addEventListener('input', updateRyoshuushoPreview);
  document.getElementById('new-table-name').addEventListener('input', function() {
    document.getElementById('name-char-count').innerText = this.value.length;
  });
  document.getElementById('new-table-name').addEventListener('keydown', function(e) {
    if(e.key==='Enter') confirmAddTable();
  });
});

window.onload = () => { renderIndex(); };
</script>
